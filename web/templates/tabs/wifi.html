<div class="content-section">
    <h2>Configurer le point d'accès Wi-Fi</h2>
    <form id="wifi-settings-form">
        <label for="wifi-ssid">SSID (Nom du réseau)</label>
        <input type="text" id="wifi-ssid" name="ssid" required>
        <div class="form-group">
            <label for="wifi-password">Mot de passe</label>
            <div class="password-container">
                <input type="password" id="wifi-password" name="password" placeholder="Laissez vide pour un réseau ouvert. Minimum 8 caractères.">
                <span class="password-toggle-icon">👁️</span>
            </div>
        </div>
        <button type="submit" class="btn primary">Enregistrer</button>
    </form>
</div>
